services:
  buildroot:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: buildroot-builder:local
    working_dir: /work
    volumes:
      - .:/work
      - ${HOST_DL_DIR:-./.cache/buildroot-dl}:/home/builder/dl
      - ${HOST_CACHE_DIR:-./.cache/buildroot-ccache}:/home/builder/.buildroot-ccache
    environment:
      BR2_DL_DIR: /home/builder/dl
      BR2_CCACHE_DIR: /home/builder/.buildroot-ccache
    command: ["make"]
    stdin_open: true
    tty: true
    user: "${UID-1000}:${GID-1000}"
