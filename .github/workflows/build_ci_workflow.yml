name: Build CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      clear-cache:
        description: 'Clear docker cache before running'
        type: boolean
        default: false
  workflow_call:
    inputs:
      upload-build-artifact:
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: Build OS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Get docker image cache
        uses: actions/cache@v5
        with:
          path: /tmp/docker-cache
          key: docker-images-${{ hashFiles('compose.yaml') }}

      - name: Clear docker cache (if requested)
        if: github.event.inputs.clear-cache == 'true'
        run: |
          echo "Clearing Docker cache..."
          rm -rf /tmp/docker-cache
          echo "Docker cache cleared"

      - name: Load or pull images
        run: |
          if [ -f /tmp/docker-cache/buildroot.tar ]; then
            echo "Loading Image"
            docker load -i /tmp/docker-cache/buildroot.tar
          else
            echo "Pulling Image"
            docker compose build buildroot
            mkdir -p /tmp/docker-cache
            docker save $(docker compose config | grep image: | awk '{print $2}') -o /tmp/docker-cache/buildroot.tar
          fi

      - name: Export UID/GID for Compose
        run: |
          echo "UID=$(id -u)" >> "$GITHUB_ENV"
          echo "GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Build the project
        run: |
          ls -alh
          make dirs
          ls -alh
          docker compose run --rm buildroot ls -alh
          make docker

      - name: 'Upload Artifact'
        if: ${{ inputs.upload-build-artifact }}
        uses: actions/upload-artifact@v6
        with:
          name: sd-image
          path: output/images/sdcard.img
          retention-days: 5
